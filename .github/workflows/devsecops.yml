name: CI-CD-Examen-Gianfranco
on: [push]

jobs:
  DevSecOps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 1. Escaneo de Semgrep (Seguridad de código estático)
      - name: Semgrep Scan
        run: |
          python3 -m pip install semgrep
          semgrep --config auto --text --output reports/semgrep-report.md

      # 2. Escaneo de Snyk (Vulnerabilidades en dependencias)
      # Nota: Continuará aunque falle para que puedas ver el reporte
      - name: Snyk Security Scan
        uses: snyk/actions/dotnet@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 3. Análisis de SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 4. Compilación del Backend (.NET Core)
      - name: Build Backend
        run: dotnet build src/Backend/Backend.csproj --configuration Release
        